<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#232323" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Inputs</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:#161616; height:100%; overflow:hidden; overflow-x:hidden; width:100%; max-width:100%; position:fixed; inset:0; }
  #root { height:100%; }
  input, textarea, button { font-family:inherit; }
  input[type="time"], input[type="date"] { -webkit-appearance:none; appearance:none; }
  input[type="time"]::-webkit-date-and-time-value { text-align:left; }
  .scrollpane { height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  ::-webkit-scrollbar { width:0; height:0; }

  @keyframes riseIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .rise { animation:riseIn 560ms cubic-bezier(.2,.85,.25,1) both; animation-delay:calc(var(--i,0) * 55ms); }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .fade { animation:fadeIn 400ms ease both; }
  @keyframes fadeSlide { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }
  .fade-slide { animation:fadeSlide 420ms cubic-bezier(.2,.8,.2,1) both; animation-delay:calc(var(--i,0) * 45ms); }
  @keyframes popIn { 0% { opacity:0; transform:scale(.86); } 55% { transform:scale(1.04); } 100% { opacity:1; transform:scale(1); } }
  .pop { animation:popIn 400ms cubic-bezier(.2,.85,.25,1) both; }
  @keyframes barGrow { from { transform:scaleY(0); } to { transform:scaleY(1); } }
  .bar-grow { transform-origin:bottom; animation:barGrow 760ms cubic-bezier(.2,.85,.25,1) both; animation-delay:calc(var(--i,0) * 65ms); }
  @keyframes glowPulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }
  .pulse { animation:glowPulse 2.4s ease-in-out infinite; }
  @keyframes sheen { from { background-position:-140% 0; } to { background-position:240% 0; } }
  .sheen { background:linear-gradient(100deg, rgba(184,247,255,0) 30%, rgba(184,247,255,0.14) 50%, rgba(184,247,255,0) 70%); background-size:200% 100%; animation:sheen 3.4s linear infinite; }
  @keyframes floatY { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
  .float { animation:floatY 4s ease-in-out infinite; }
  @keyframes ringPop { 0% { transform:scale(.7); opacity:0; } 100% { transform:scale(1); opacity:1; } }
  .ring-pop { animation:ringPop 500ms cubic-bezier(.2,.85,.25,1) both; }
  @keyframes countUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .count { animation:countUp 500ms ease both; }
  @keyframes hue { 0% { background-position:0% 50%; } 100% { background-position:100% 50%; } }
  .mood-track { background-size:220% 100%; animation:hue 7s ease-in-out infinite alternate; }
  @keyframes tintIn { from { opacity:0; } to { opacity:1; } }
  .tint-in { animation:tintIn 620ms ease both; }
  @keyframes thumbPop { 0% { transform:translate(-50%,-50%) scale(.6); } 60% { transform:translate(-50%,-50%) scale(1.12); } 100% { transform:translate(-50%,-50%) scale(1); } }
  .thumb-pop { animation:thumbPop 260ms cubic-bezier(.2,.85,.25,1) both; }

  .press { transition:transform 150ms cubic-bezier(.2,.8,.2,1), background 200ms ease, border-color 200ms ease, color 200ms ease, box-shadow 240ms ease; }
  .press:active { transform:scale(.94); }
  .jfocus:focus { border-color:rgba(0,121,152,0.7) !important; box-shadow:0 0 0 3px rgba(0,121,152,0.15) !important; }
  .chip { transition:transform 150ms cubic-bezier(.2,.8,.2,1), background 220ms ease, color 220ms ease, border-color 220ms ease, box-shadow 240ms ease; }
  .chip:active { transform:scale(.9); }
  .lift { transition:transform 220ms cubic-bezier(.2,.85,.25,1), box-shadow 260ms ease, border-color 220ms ease; }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "habit-tracker-v1";
const APP_VERSION = "2026-07-05.5";

/* ---------- GLACIER · Apple-dark on Jakub's palette ---------- */
const P = {
  bg: "#232323", bgDeep: "#161616",
  text: "#FFFFFF",
  dim: "#DBDBDB",
  faint: "rgba(219,219,219,0.45)",
  slate: "#636363",
  teal: "#007998", loss: "#FC4422", ice: "#B8F7FF",
  accent: "#007998",
  good: "#007998", warn: "#B8F7FF", bad: "#FC4422",
  tealTint: "rgba(0,121,152,0.18)", lossTint: "rgba(252,68,34,0.10)",
  iceTint: "rgba(184,247,255,0.08)", slateTint: "rgba(99,99,99,0.22)",
  card: "#2E2E2E", cardHi: "#383838",
  border: "rgba(255,255,255,0.08)",
  track: "rgba(255,255,255,0.09)",
};
const GRAD_PRIMARY = "linear-gradient(135deg, #007998 0%, #B8F7FF 170%)";
const MONO = "ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace";
const SANS = "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif";

const card = (extra = {}) => ({
  background: P.card,
  border: "1px solid rgba(255,255,255,0.05)",
  boxShadow: "inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 22px rgba(0,0,0,0.34)",
  ...extra,
});

/* ---------- helpers ---------- */
const pad2 = (n) => String(n).padStart(2, "0");
const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };
const nowHM = () => { const d = new Date(); return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const SLEEP_MIN = 7;

const hoursBetween = (bed, wake) => {
  if (!bed || !wake) return null;
  const [bh, bm] = bed.split(":").map(Number);
  const [wh, wm] = wake.split(":").map(Number);
  if ([bh,bm,wh,wm].some(isNaN)) return null;
  let mins = (wh*60+wm) - (bh*60+bm);
  if (mins <= 0) mins += 24*60;
  return Math.round((mins/60) * 100) / 100;
};
const fmtHours = (h) => h === null ? "—" : `${Math.floor(h)}h${pad2(Math.round((h - Math.floor(h))*60))}`;
const dayName = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("en-GB", { weekday:"short" });
const dayNameLong = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("en-GB", { weekday:"long" });
const prettyDate = (iso) => { const [y,m,d] = iso.split("-"); return `${parseInt(d)}.${parseInt(m)}.${y}`; };
const shiftISO = (iso, delta) => { const d = new Date(iso+"T00:00:00"); d.setDate(d.getDate()+delta); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; };

const avgMood = (day) => {
  if (!day || !day.moods || day.moods.length === 0) return null;
  return Math.round((day.moods.reduce((a,m) => a + m.v, 0) / day.moods.length) * 10) / 10;
};
const emptyDay = (iso) => ({ date: iso, bedtime: "", wake: "", phoneOff: null, reels: null, reelsMins: "", briefing: null, moods: [], note: "" });
const dayHasData = (d) => !!(d.bedtime || d.wake || d.phoneOff !== null || d.reels !== null || d.briefing !== null || (d.moods && d.moods.length) || d.note);
const isBrokenDay = (d) => {
  if (!d || !dayHasData(d)) return false;
  const h = hoursBetween(d.bedtime, d.wake), am = avgMood(d);
  return (h !== null && h < SLEEP_MIN) || d.briefing === false || (d.reels === true && (parseInt(d.reelsMins)||0) >= 30) || (am !== null && am < 3);
};
const brokenReasons = (d) => {
  const out = [], h = hoursBetween(d.bedtime, d.wake), am = avgMood(d);
  if (h !== null && h < SLEEP_MIN) out.push(`sleep ${fmtHours(h)}`);
  if (d.briefing === false) out.push("no briefing");
  if (d.reels === true && (parseInt(d.reelsMins)||0) >= 30) out.push("reels binge");
  if (am !== null && am < 3) out.push(`mood ${am}`);
  return out;
};

/* ---------- storage ---------- */
const loadData = () => {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { const d = JSON.parse(raw); if (d && d.days) return d; } } catch (e) {}
  return { days: {} };
};
const saveData = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); return true; } catch (e) { return false; } };

/* ---------- background ---------- */
const Background = () => (
  <div style={{ position: "fixed", inset: 0, zIndex: -1, background: `linear-gradient(170deg, ${P.bg} 0%, ${P.bgDeep} 72%, #0E0E0E 100%)` }}>
    <div className="float" style={{ position: "absolute", width: 480, height: 480, top: -190, right: -170, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,121,152,0.16), transparent 65%)" }} />
    <div style={{ position: "absolute", width: 320, height: 320, bottom: -120, left: -130, borderRadius: "50%", background: "radial-gradient(circle, rgba(184,247,255,0.05), transparent 65%)" }} />
  </div>
);

/* ---------- inline icons (stroke, currentColor) ---------- */
const Icon = ({ name, size = 18, stroke = 1.8 }) => {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round" };
  const paths = {
    moon: <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />,
    phone: <React.Fragment><rect x="7" y="2.5" width="10" height="19" rx="2.5" /><line x1="11" y1="18.5" x2="13" y2="18.5" /></React.Fragment>,
    play: <React.Fragment><rect x="3" y="4" width="18" height="16" rx="3" /><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none" /></React.Fragment>,
    sun: <React.Fragment><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" /></React.Fragment>,
    heart: <path d="M20.8 6.6a5 5 0 0 0-8.8-2 5 5 0 0 0-8.8 2c0 4.6 8.8 10 8.8 10s8.8-5.4 8.8-10z" />,
    pen: <React.Fragment><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" /></React.Fragment>,
    activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
    calendar: <React.Fragment><rect x="3" y="4.5" width="18" height="16" rx="2.5" /><line x1="3" y1="9.5" x2="21" y2="9.5" /><line x1="8" y1="2.5" x2="8" y2="6" /><line x1="16" y1="2.5" x2="16" y2="6" /></React.Fragment>,
    spark: <path d="M12 3l1.9 5.6L19.5 10l-5.6 1.9L12 17.5 10.1 12 4.5 10l5.6-1.4z" />,
    copy: <React.Fragment><rect x="9" y="9" width="11" height="11" rx="2.5" /><path d="M5 15V6.5A2.5 2.5 0 0 1 7.5 4H16" /></React.Fragment>,
  };
  return <svg {...common} style={{ display: "block" }}>{paths[name] || null}</svg>;
};

/* ---------- primitives ---------- */
const Section = ({ children, style, i = 0, tint, glow }) => (
  <div className="rise lift" style={{ "--i": i, ...card(),
    borderRadius: 20,
    background: tint ? `linear-gradient(120deg, ${tint} 0%, ${P.card} 62%)` : P.card,
    boxShadow: glow ? `inset 0 1px 0 rgba(184,247,255,0.10), 0 10px 26px rgba(0,0,0,0.4), 0 0 24px ${glow}` : "inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 24px rgba(0,0,0,0.35)",
    ...style }}>
    {children}
  </div>
);

const Label = ({ children, right, icon }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
    <span style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.16em", color: P.faint, fontFamily: SANS }}>
      {icon && <Icon name={icon} size={14} />}{children}
    </span>
    {right}
  </div>
);

const Toggle = ({ value, onChange, goodValue = true }) => (
  <div style={{ display: "inline-flex", borderRadius: 13, padding: 3, gap: 2, background: "rgba(0,0,0,0.22)", boxShadow: "inset 0 1px 2px rgba(0,0,0,0.3)" }}>
    {[[true, "Yes"], [false, "No"]].map(([v, l]) => {
      const on = value === v, good = v === goodValue;
      return (
        <button key={l} onClick={() => onChange(on ? null : v)} className="chip"
          style={{ padding: "7px 17px", borderRadius: 10, fontSize: 14, fontWeight: on ? 750 : 500, fontFamily: SANS, border: "none",
            background: on ? (good ? "rgba(0,121,152,0.32)" : "rgba(252,68,34,0.26)") : "transparent",
            color: on ? (good ? P.ice : "#FF8C7A") : P.faint,
            boxShadow: on ? (good ? "inset 0 0 0 1px rgba(184,247,255,0.25), 0 0 12px rgba(0,121,152,0.3)" : "inset 0 0 0 1px rgba(252,68,34,0.3), 0 0 12px rgba(252,68,34,0.22)") : "none" }}>
          {l}
        </button>
      );
    })}
  </div>
);

/* card that colours itself with a gradient wash when answered */
const ToggleCard = ({ i, label, value, onChange, goodValue, icon, children }) => {
  const answered = value !== null;
  const good = value === goodValue;
  const glowCol = !answered ? null : good ? "rgba(0,121,152,0.16)" : "rgba(252,68,34,0.12)";
  return (
    <div className="rise lift" style={{ "--i": i, borderRadius: 20, position: "relative", overflow: "hidden", marginBottom: 12,
      background: P.card, border: `1px solid ${P.border}`,
      boxShadow: answered
        ? `inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 26px rgba(0,0,0,0.38), 0 0 26px ${glowCol}`
        : "inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 22px rgba(0,0,0,0.34)",
      transition: "box-shadow 560ms ease" }}>
      {answered && (
        <div key={String(value)} className="tint-in" style={{ position: "absolute", inset: 0, pointerEvents: "none",
          background: good ? "linear-gradient(118deg, rgba(0,121,152,0.16) 0%, rgba(0,121,152,0.04) 42%, transparent 74%)"
                           : "linear-gradient(118deg, rgba(252,68,34,0.13) 0%, rgba(252,68,34,0.03) 42%, transparent 74%)" }} />
      )}
      <div style={{ position: "relative", padding: "16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11, minWidth: 0 }}>
            <span style={{ width: 32, height: 32, borderRadius: 10, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
              background: answered ? (good ? "rgba(0,121,152,0.16)" : "rgba(252,68,34,0.12)") : "rgba(255,255,255,0.04)",
              color: answered ? (good ? P.ice : "#FF8C7A") : P.faint, transition: "background 400ms ease, color 400ms ease" }}>
              <Icon name={icon} size={17} />
            </span>
            <span style={{ fontSize: 14.5, color: P.text, fontFamily: SANS }}>{label}</span>
          </div>
          <Toggle value={value} onChange={onChange} goodValue={goodValue} />
        </div>
        {children}
      </div>
    </div>
  );
};

/* animated ring */
const Ring = ({ pct, size = 66, stroke = 5, color = P.teal, children, glow = true, delay = 80 }) => {
  const r = (size - stroke) / 2, C = 2 * Math.PI * r;
  const [on, setOn] = useState(false);
  useEffect(() => { const t = setTimeout(() => setOn(true), delay); return () => clearTimeout(t); }, []);
  const off = C * (1 - Math.max(0, Math.min(1, (on ? pct : 0) / 100)));
  return (
    <div className="ring-pop" style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={P.track} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off}
          style={{ transition: "stroke-dashoffset 1000ms cubic-bezier(.2,.85,.25,1)", filter: glow ? `drop-shadow(0 0 6px ${color === P.teal ? P.ice : color}77)` : "none" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>{children}</div>
    </div>
  );
};

/* sleep bars */
const SleepBars = ({ days }) => {
  const vals = days.map((d) => hoursBetween(d.bedtime, d.wake));
  const max = Math.max(9, ...vals.filter((v) => v !== null));
  const floorY = (SLEEP_MIN / max) * 70;
  return (
    <div style={{ position: "relative" }}>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 20 + floorY, height: 1, background: "rgba(184,247,255,0.3)", zIndex: 2 }} />
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 7, height: 92 }}>
        {days.map((d, i) => {
          const h = vals[i];
          const pctH = h === null ? 0 : Math.max(6, (h / max) * 70);
          const bad = h !== null && h < SLEEP_MIN;
          return (
            <div key={d.date} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
              <span className="count" style={{ fontSize: 9, fontFamily: MONO, color: bad ? P.bad : P.dim, animationDelay: `${i*65+400}ms` }}>{h === null ? "" : h.toFixed(1)}</span>
              <div style={{ width: "100%", maxWidth: 26, height: 70, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                <div className="bar-grow" style={{ "--i": i, height: pctH, borderRadius: 6,
                  background: h === null ? "#3A3A3A" : bad ? P.bad : GRAD_PRIMARY,
                  boxShadow: h === null ? "none" : bad ? `0 0 8px ${P.bad}55` : "0 0 10px rgba(0,121,152,0.5)" }} />
              </div>
              <span style={{ fontSize: 9.5, fontFamily: SANS, color: P.faint }}>{dayName(d.date)[0]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* mood line */
const MoodLine = ({ days }) => {
  const pts = days.map((d) => avgMood(d));
  const W = 320, H = 100, pad = 12;
  const X = (i) => pad + (i / (days.length - 1)) * (W - 2*pad);
  const Y = (v) => H - pad - ((v - 1) / 4) * (H - 2*pad);
  const real = pts.map((v, i) => ({ v, i })).filter((p) => p.v !== null);
  const path = real.map((p, k) => `${k === 0 ? "M" : "L"} ${X(p.i)} ${Y(p.v)}`).join(" ");
  const areaPath = real.length >= 2 ? `${path} L ${X(real[real.length-1].i)} ${H-pad} L ${X(real[0].i)} ${H-pad} Z` : "";
  const [on, setOn] = useState(false);
  const lineRef = useRef(null);
  const [len, setLen] = useState(600);
  useEffect(() => { if (lineRef.current) setLen(lineRef.current.getTotalLength()); const t = setTimeout(() => setOn(true), 100); return () => clearTimeout(t); }, []);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id="moodArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={P.teal} stopOpacity="0.32" /><stop offset="1" stopColor={P.teal} stopOpacity="0" />
        </linearGradient>
        <linearGradient id="moodLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stopColor={P.teal} /><stop offset="1" stopColor={P.ice} />
        </linearGradient>
      </defs>
      {[1,2,3,4,5].map((g) => (
        <line key={g} x1={pad} x2={W-pad} y1={Y(g)} y2={Y(g)} stroke={P.border} strokeWidth={g === 3 ? 1 : 0.5} strokeDasharray={g === 3 ? "2 4" : "none"} />
      ))}
      {real.length >= 2 && <path d={areaPath} fill="url(#moodArea)" style={{ opacity: on ? 1 : 0, transition: "opacity 700ms ease 400ms" }} />}
      {real.length >= 2 && (
        <path ref={lineRef} d={path} fill="none" stroke="url(#moodLine)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"
          style={{ filter: "drop-shadow(0 0 5px rgba(184,247,255,0.5))", strokeDasharray: len, strokeDashoffset: on ? 0 : len, transition: "stroke-dashoffset 1150ms ease" }} />
      )}
      {real.map((p, k) => (
        <circle key={p.i} cx={X(p.i)} cy={Y(p.v)} r={k === real.length-1 ? 4.2 : 3.2} fill={k === real.length-1 ? P.ice : P.teal}
          style={{ opacity: on ? 1 : 0, transition: `opacity 400ms ease ${500 + k*60}ms`, filter: "drop-shadow(0 0 4px rgba(184,247,255,0.7))" }} />
      ))}
    </svg>
  );
};

/* mood spectrum + draggable slider */
const moodColor = (v) => v <= 1 ? "#FC4422" : v === 2 ? "#FF7A4D" : v === 3 ? "#9A9A9A" : v === 4 ? "#007998" : "#B8F7FF";
const moodWord = (v) => ["", "rough", "low", "flat", "good", "sharp"][v] || "";
const MoodSlider = ({ onPick }) => {
  const ref = useRef(null);
  const [val, setVal] = useState(3);
  const [dragging, setDragging] = useState(false);
  const [logged, setLogged] = useState(false);
  const calc = (clientX) => {
    const r = ref.current.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    return 1 + Math.round(p * 4);
  };
  const start = (e) => { setDragging(true); setLogged(false); setVal(calc(e.clientX)); try { ref.current.setPointerCapture(e.pointerId); } catch (_) {} };
  const move = (e) => { if (dragging) setVal(calc(e.clientX)); };
  const end = () => { if (dragging) { onPick(val); setLogged(true); setTimeout(() => setLogged(false), 1400); } setDragging(false); };
  const pct = ((val - 1) / 4) * 100;
  return (
    <div style={{ userSelect: "none" }}>
      {/* numbers above */}
      <div style={{ display: "flex", justifyContent: "space-between", padding: "0 4px", marginBottom: 9 }}>
        {[1,2,3,4,5].map((n) => (
          <div key={n} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, transition: "transform 200ms ease", transform: val === n ? "translateY(-2px) scale(1.12)" : "scale(1)" }}>
            <span style={{ fontSize: 16, fontWeight: 800, fontFamily: MONO, color: val === n ? moodColor(n) : P.faint, textShadow: val === n ? `0 0 12px ${moodColor(n)}88` : "none", transition: "color 200ms" }}>{n}</span>
            <span style={{ width: val === n ? 5 : 3, height: val === n ? 5 : 3, borderRadius: "50%", background: val === n ? moodColor(n) : P.faint, transition: "all 200ms", boxShadow: val === n ? `0 0 8px ${moodColor(n)}` : "none" }} />
          </div>
        ))}
      </div>
      {/* track */}
      <div ref={ref} onPointerDown={start} onPointerMove={move} onPointerUp={end} onPointerCancel={end}
        className="mood-track"
        style={{ position: "relative", height: 30, borderRadius: 999, cursor: "pointer", touchAction: "none", margin: "8px 0 4px",
          background: "linear-gradient(90deg, #FC4422 0%, #FF7A4D 26%, #6E6E6E 50%, #007998 76%, #B8F7FF 100%)",
          opacity: 0.92, boxShadow: "inset 0 1px 2px rgba(255,255,255,0.2), inset 0 -2px 5px rgba(0,0,0,0.35)" }}>
        {/* handle */}
        <div className={dragging ? "" : "thumb-pop"} style={{ position: "absolute", top: "50%", left: `${pct}%`, transform: "translate(-50%,-50%)",
          width: dragging ? 34 : 28, height: dragging ? 34 : 28, borderRadius: "50%", background: "#fff",
          border: `3px solid ${moodColor(val)}`,
          boxShadow: `0 3px 12px rgba(0,0,0,0.5), 0 0 ${dragging ? 20 : 12}px ${moodColor(val)}`,
          display: "flex", alignItems: "center", justifyContent: "center", fontFamily: MONO, fontWeight: 800, color: moodColor(val), fontSize: dragging ? 15 : 13,
          transition: dragging ? "width 120ms, height 120ms, box-shadow 120ms" : "left 200ms cubic-bezier(.2,.85,.25,1), width 160ms, height 160ms", pointerEvents: "none", zIndex: 2 }}>
          {val}
        </div>
      </div>
      {/* caption */}
      <div style={{ textAlign: "center", height: 20, marginTop: 6 }}>
        {logged
          ? <span className="pop" style={{ fontSize: 12.5, fontWeight: 700, fontFamily: SANS, color: P.ice }}>✓ logged {val} · {moodWord(val)}</span>
          : <span style={{ fontSize: 12, color: P.faint, fontFamily: SANS }}>{dragging ? `${val} · ${moodWord(val)}` : "drag the handle · release to log"}</span>}
      </div>
    </div>
  );
};

/* ---------- app ---------- */
const App = () => {
  const [data, setData] = useState(loadData);
  const [saveErr, setSaveErr] = useState(false);
  const [sel, setSel] = useState(todayISO());
  const [tab, setTab] = useState("today");
  const [copied, setCopied] = useState(false);
  const [upState, setUpState] = useState("idle");
  const [upLatest, setUpLatest] = useState("");

  const persist = (next) => { setData(next); setSaveErr(!saveData(next)); };
  const day = data.days[sel] || emptyDay(sel);
  const updDay = (patch) => persist({ ...data, days: { ...data.days, [sel]: { ...day, ...patch } } });

  const last7 = useMemo(() => {
    const arr = [];
    for (let i = 6; i >= 0; i--) { const iso = shiftISO(todayISO(), -i); arr.push(data.days[iso] || emptyDay(iso)); }
    return arr;
  }, [data]);

  const advisory = useMemo(() => {
    for (let i = last7.length - 1; i >= 1; i--) if (isBrokenDay(last7[i]) && isBrokenDay(last7[i-1])) return true;
    return false;
  }, [last7]);

  const sleepH = hoursBetween(day.bedtime, day.wake);
  const dayMood = avgMood(day);
  const brokenToday = isBrokenDay(day);
  const isToday = sel === todayISO();

  const addMood = (v) => updDay({ moods: [...day.moods, { id: uid(), v, t: nowHM() }] });
  const delMood = (id) => updDay({ moods: day.moods.filter((m) => m.id !== id) });

  const checkUpdate = async () => {
    setUpState("checking");
    try {
      const base = location.pathname.split("?")[0];
      const res = await fetch(base + "?_=" + Date.now(), { cache: "no-store" });
      const txt = await res.text();
      const m = txt.match(/APP_VERSION\s*=\s*["']([^"']+)["']/);
      const latest = m ? m[1] : null;
      if (!latest) { setUpState("error"); return; }
      setUpLatest(latest); setUpState(latest === APP_VERSION ? "current" : "available");
    } catch (e) { setUpState("error"); }
  };
  const doUpdate = () => { const base = location.pathname.split("?")[0]; location.href = base + "?v=" + Date.now(); };

  const copyAll = async () => {
    const isos = Object.keys(data.days).filter((k) => dayHasData(data.days[k])).sort();
    const lines = ["INPUTS — habit & mood log", ""];
    for (const iso of isos) {
      const d = data.days[iso], h = hoursBetween(d.bedtime, d.wake), am = avgMood(d);
      const parts = [];
      parts.push(`sleep ${h === null ? "—" : fmtHours(h)}${h !== null && h < SLEEP_MIN ? " ⚠" : ""}`);
      parts.push(`phone-off ${d.phoneOff === null ? "—" : d.phoneOff ? "Y" : "N"}`);
      parts.push(`reels ${d.reels === null ? "—" : d.reels ? "Y" : "N"}${d.reels && d.reelsMins ? ` ${d.reelsMins}m` : ""}`);
      parts.push(`briefing ${d.briefing === null ? "—" : d.briefing ? "Y" : "N"}`);
      parts.push(`mood ${am === null ? "—" : am}${d.moods.length ? ` (${d.moods.map((m) => `${m.v}@${m.t}`).join(",")})` : ""}`);
      let line = `${prettyDate(iso)} ${dayName(iso)} | ${parts.join(" · ")}`;
      if (isBrokenDay(d)) line += ` | BROKEN: ${brokenReasons(d).join(", ")}`;
      if (d.note) line += `\n   note: ${d.note}`;
      lines.push(line);
    }
    lines.push("", `exported ${prettyDate(todayISO())} · v${APP_VERSION}`);
    try { await navigator.clipboard.writeText(lines.join("\n")); setCopied(true); setTimeout(() => setCopied(false), 1700); } catch (e) {}
  };

  const timeInput = (val, on) => (
    <input type="time" value={val} onChange={(e) => on(e.target.value)} className="jfocus"
      style={{ width: "100%", background: "rgba(0,0,0,0.18)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 13, padding: "12px 14px", color: P.text, fontSize: 16, fontFamily: MONO, outline: "none", transition: "border-color 180ms, box-shadow 180ms" }} />
  );

  return (
    <div className="scrollpane">
      <Background />
      <div style={{ padding: `max(22px, env(safe-area-inset-top)) 18px ${tab === "today" ? 215 : 150}px`, maxWidth: 560, margin: "0 auto" }}>

        {/* header removed — date lives above the dock */}

        {/* advisory */}
        {advisory && (
          <div className="pop" style={{ position: "relative", overflow: "hidden", background: `linear-gradient(120deg, ${P.lossTint} 0%, ${P.card} 70%)`, border: `1px solid rgba(252,68,34,0.42)`, borderRadius: 18, padding: "15px 16px", marginBottom: 16, boxShadow: "0 0 24px rgba(252,68,34,0.14)" }}>
            <div className="sheen" style={{ position: "absolute", inset: 0, pointerEvents: "none" }} />
            <div style={{ display: "flex", alignItems: "center", gap: 12, position: "relative" }}>
              <div className="pulse" style={{ width: 10, height: 10, borderRadius: "50%", background: P.loss, flexShrink: 0, boxShadow: `0 0 10px ${P.loss}` }} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: P.text, fontFamily: SANS }}>Restore your inputs before trading.</div>
                <div style={{ fontSize: 12, color: P.dim, fontFamily: SANS, marginTop: 2 }}>Two broken days in a row. Reset sleep, briefing, screen first.</div>
              </div>
            </div>
          </div>
        )}

        {tab === "today" ? (
          <div key="today" className="fade">
            {/* sleep */}
            <Section i={2} style={{ padding: "16px", marginBottom: 12 }} tint={sleepH !== null && sleepH < SLEEP_MIN ? P.lossTint : sleepH !== null ? P.tealTint : null} glow={sleepH !== null && sleepH >= SLEEP_MIN ? "rgba(0,121,152,0.18)" : null}>
              <Label right={sleepH !== null && (
                <span className="pop" style={{ fontSize: 15, fontWeight: 800, fontFamily: MONO, color: sleepH < SLEEP_MIN ? P.bad : P.ice, textShadow: sleepH >= SLEEP_MIN ? "0 0 14px rgba(184,247,255,0.4)" : "none" }}>
                  {fmtHours(sleepH)}{sleepH < SLEEP_MIN ? " ⚠" : ""}
                </span>
              )} icon="moon">Sleep</Label>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: P.faint, marginBottom: 5, fontFamily: SANS }}>Bedtime</div>
                  {timeInput(day.bedtime, (v) => updDay({ bedtime: v }))}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: P.faint, marginBottom: 5, fontFamily: SANS }}>Wake</div>
                  {timeInput(day.wake, (v) => updDay({ wake: v }))}
                </div>
              </div>
              {sleepH !== null && sleepH < SLEEP_MIN && <div className="fade" style={{ marginTop: 10, fontSize: 12, color: P.bad, fontFamily: SANS }}>Under {SLEEP_MIN}h — recovery debt.</div>}
            </Section>

            {/* phone */}
            <ToggleCard i={3} icon="phone" label="Phone off last night?" value={day.phoneOff} onChange={(v) => updDay({ phoneOff: v })} goodValue={true} />

            {/* reels */}
            <ToggleCard i={4} icon="play" label="Reels / scrolling?" value={day.reels} onChange={(v) => updDay({ reels: v })} goodValue={false}>
              {day.reels && (
                <div className="fade" style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 14 }}>
                  <input value={day.reelsMins} onChange={(e) => updDay({ reelsMins: e.target.value.replace(/[^0-9]/g, "") })} inputMode="numeric" placeholder="rough minutes" className="jfocus"
                    style={{ flex: 1, background: P.cardHi, border: `1px solid ${(parseInt(day.reelsMins)||0) >= 30 ? "rgba(252,68,34,0.45)" : "rgba(255,255,255,0.05)"}`, borderRadius: 12, padding: "11px 14px", color: P.text, fontSize: 15, fontFamily: MONO, outline: "none", transition: "border-color 180ms" }} />
                  <span className={(parseInt(day.reelsMins)||0) >= 30 ? "pop" : ""} style={{ fontSize: 12, fontWeight: (parseInt(day.reelsMins)||0) >= 30 ? 700 : 400, color: (parseInt(day.reelsMins)||0) >= 30 ? P.bad : P.faint, fontFamily: SANS, whiteSpace: "nowrap" }}>{(parseInt(day.reelsMins)||0) >= 30 ? "binge ⚠" : "min"}</span>
                </div>
              )}
            </ToggleCard>

            {/* briefing */}
            <ToggleCard i={5} icon="sun" label="Morning briefing done?" value={day.briefing} onChange={(v) => updDay({ briefing: v })} goodValue={true} />

            {/* mood */}
            <Section i={4} style={{ padding: "16px", marginBottom: 12 }} tint={dayMood !== null && dayMood < 3 ? P.lossTint : dayMood !== null && dayMood >= 4 ? P.tealTint : null}>
              <Label right={dayMood !== null && (
                <span className="pop" style={{ fontSize: 14, fontWeight: 800, fontFamily: MONO, color: dayMood < 3 ? P.bad : dayMood >= 4 ? P.ice : P.dim }}>avg {dayMood}</span>
              )} icon="heart">Mood / state</Label>
              <MoodSlider onPick={addMood} />
              {day.moods.length > 0 && (
                <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 7 }}>
                  {day.moods.map((m, k) => (
                    <div key={m.id} className="fade-slide" style={{ "--i": k, display: "flex", alignItems: "center", gap: 11, background: P.cardHi, borderRadius: 11, padding: "9px 13px" }}>
                      <span style={{ width: 26, height: 26, borderRadius: 8, background: m.v <= 2 ? P.lossTint : m.v === 3 ? P.track : P.tealTint, color: m.v <= 2 ? P.bad : m.v === 3 ? P.dim : P.ice, fontFamily: MONO, fontWeight: 800, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{m.v}</span>
                      <span style={{ fontSize: 13, color: P.dim, fontFamily: MONO }}>{m.t}</span>
                      <button onClick={() => delMood(m.id)} className="press" style={{ marginLeft: "auto", color: P.faint, fontSize: 17, padding: "0 6px" }}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </Section>

            {/* note */}
            <Section i={5} style={{ padding: "16px", marginBottom: 12 }}>
              <Label icon="pen">Note</Label>
              <input value={day.note} onChange={(e) => updDay({ note: e.target.value })} placeholder="one line, optional" className="jfocus"
                style={{ width: "100%", background: "rgba(0,0,0,0.18)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 14px", color: P.text, fontSize: 15, fontFamily: SANS, outline: "none", transition: "border-color 180ms, box-shadow 180ms" }} />
            </Section>

            {/* status chip */}
            {dayHasData(day) && (
              <div className="pop" style={{ textAlign: "center", marginTop: 6 }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "9px 17px", borderRadius: 999,
                  background: brokenToday ? P.lossTint : P.tealTint,
                  border: `1px solid ${brokenToday ? "rgba(252,68,34,0.38)" : "rgba(0,121,152,0.4)"}`,
                  color: brokenToday ? P.bad : P.ice, fontSize: 12.5, fontWeight: 650, fontFamily: SANS }}>
                  <span className="pulse" style={{ width: 7, height: 7, borderRadius: "50%", background: "currentColor" }} />
                  {brokenToday ? `Broken day · ${brokenReasons(day).join(", ")}` : "Inputs healthy"}
                </span>
              </div>
            )}
          </div>
        ) : (
          <div key="week" className="fade">
            {/* input health */}
            <Section i={1} style={{ padding: "18px 16px", marginBottom: 12 }}>
              <Label icon="activity">Input health · last 7 days</Label>
              {(() => {
                const withData = last7.filter(dayHasData);
                const broken = last7.filter(isBrokenDay).length;
                const healthy = withData.length - broken;
                const pct = withData.length ? Math.round((healthy / withData.length) * 100) : 0;
                return (
                  <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
                    <Ring pct={pct} size={84} stroke={7} color={pct >= 60 ? P.teal : pct >= 40 ? P.ice : P.bad}>
                      <span className="count" style={{ fontSize: 21, fontWeight: 800, fontFamily: MONO, color: P.text, animationDelay: "400ms" }}>{pct}%</span>
                      <span style={{ fontSize: 8, letterSpacing: "0.16em", color: P.faint, fontFamily: SANS, marginTop: 1 }}>HEALTHY</span>
                    </Ring>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
                        <span className="count" style={{ fontSize: 27, fontWeight: 800, fontFamily: MONO, color: broken > 0 ? P.bad : P.teal, animationDelay: "300ms" }}>{broken}</span>
                        <span style={{ fontSize: 13, color: P.dim, fontFamily: SANS }}>broken {broken === 1 ? "day" : "days"}</span>
                      </div>
                      <div style={{ display: "flex", gap: 5 }}>
                        {last7.map((d, i) => {
                          const has = dayHasData(d), brk = isBrokenDay(d);
                          return <div key={d.date} className="bar-grow" style={{ "--i": i, flex: 1, height: 34, borderRadius: 7,
                            background: !has ? "#333" : brk ? P.bad : GRAD_PRIMARY, opacity: !has ? 0.5 : 1,
                            boxShadow: has && !brk ? "0 0 9px rgba(0,121,152,0.4)" : brk ? "0 0 9px rgba(252,68,34,0.35)" : "none" }} />;
                        })}
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5 }}>
                        {last7.map((d) => <span key={d.date} style={{ flex: 1, textAlign: "center", fontSize: 9, color: P.faint, fontFamily: SANS }}>{dayName(d.date)[0]}</span>)}
                      </div>
                    </div>
                  </div>
                );
              })()}
            </Section>

            {/* sleep trend */}
            <Section i={2} style={{ padding: "18px 16px", marginBottom: 12 }}>
              <Label right={(() => {
                const vals = last7.map((d) => hoursBetween(d.bedtime, d.wake)).filter((v) => v !== null);
                const avg = vals.length ? Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10 : null;
                return avg !== null && <span style={{ fontSize: 12, fontFamily: MONO, color: avg < SLEEP_MIN ? P.bad : P.ice }}>avg {avg}h</span>;
              })()} icon="moon">Sleep hours trend</Label>
              <SleepBars days={last7} />
              <div style={{ fontSize: 11, color: P.faint, fontFamily: SANS, marginTop: 12, textAlign: "center" }}>Ice line marks {SLEEP_MIN}h floor · red = under</div>
            </Section>

            {/* mood trend */}
            <Section i={3} style={{ padding: "18px 16px", marginBottom: 12 }}>
              <Label right={(() => {
                const vals = last7.map(avgMood).filter((v) => v !== null);
                const avg = vals.length ? Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10 : null;
                return avg !== null && <span style={{ fontSize: 12, fontFamily: MONO, color: avg < 3 ? P.bad : avg >= 4 ? P.ice : P.dim }}>avg {avg}</span>;
              })()} icon="heart">Mood trend</Label>
              <MoodLine days={last7} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                {last7.map((d) => <span key={d.date} style={{ flex: 1, textAlign: "center", fontSize: 9.5, color: P.faint, fontFamily: SANS }}>{dayName(d.date)[0]}</span>)}
              </div>
            </Section>

            {/* direction */}
            <Section i={4} style={{ padding: "16px", marginBottom: 12 }}>
              <Label icon="spark">Direction</Label>
              {(() => {
                const half = (arr) => {
                  const a = arr.slice(0,4).filter((v) => v !== null), b = arr.slice(4).filter((v) => v !== null);
                  if (!a.length || !b.length) return null;
                  return (b.reduce((x,y)=>x+y,0)/b.length) - (a.reduce((x,y)=>x+y,0)/a.length);
                };
                const sleepSlope = half(last7.map((d) => hoursBetween(d.bedtime, d.wake)));
                const moodSlope = half(last7.map(avgMood));
                const reelsSlope = half(last7.map((d) => d.reels === true ? (parseInt(d.reelsMins)||1) : d.reels === false ? 0 : null));
                const Row = ({ label, slope, unit, goodUp, i }) => {
                  if (slope === null) return (
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", fontFamily: SANS }}>
                      <span style={{ fontSize: 14, color: P.dim }}>{label}</span><span style={{ fontSize: 13, color: P.faint }}>not enough data</span>
                    </div>
                  );
                  const up = slope > 0.05, down = slope < -0.05;
                  const good = (goodUp && up) || (!goodUp && down), bad = (goodUp && down) || (!goodUp && up);
                  const color = good ? P.teal : bad ? P.bad : P.dim;
                  return (
                    <div className="fade-slide" style={{ "--i": i, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", fontFamily: SANS }}>
                      <span style={{ fontSize: 14, color: P.text }}>{label}</span>
                      <span style={{ fontSize: 14, fontWeight: 700, color, fontFamily: MONO }}>{up ? "↑" : down ? "↓" : "→"} {Math.abs(slope) < 0.05 ? "flat" : `${slope > 0 ? "+" : ""}${Math.round(slope*10)/10}${unit}`}</span>
                    </div>
                  );
                };
                return (
                  <div>
                    <Row label="Sleep" slope={sleepSlope} unit="h" goodUp={true} i={0} />
                    <div style={{ height: 1, background: P.border }} />
                    <Row label="Mood" slope={moodSlope} unit="" goodUp={true} i={1} />
                    <div style={{ height: 1, background: P.border }} />
                    <Row label="Reels" slope={reelsSlope} unit="m" goodUp={false} i={2} />
                    <div style={{ fontSize: 10.5, color: P.faint, fontFamily: SANS, marginTop: 8 }}>Later 3 days vs earlier 4 — the slope of your inputs.</div>
                  </div>
                );
              })()}
            </Section>
          </div>
        )}

        {/* version */}
        <div style={{ textAlign: "center", marginTop: 20 }}>
          {upState === "available" ? (
            <button onClick={doUpdate} className="press" style={{ background: GRAD_PRIMARY, color: "#fff", fontSize: 13, fontWeight: 700, padding: "11px 20px", borderRadius: 13, fontFamily: SANS, boxShadow: "0 6px 18px rgba(0,121,152,0.35)" }}>Update now → v{upLatest}</button>
          ) : (
            <button onClick={checkUpdate} className="press" style={{ ...card(), color: P.dim, fontSize: 12.5, padding: "9px 16px", borderRadius: 11, fontFamily: SANS }}>{upState === "checking" ? "Checking…" : "Check for updates"}</button>
          )}
          <div style={{ fontSize: 10.5, color: P.faint, fontFamily: MONO, marginTop: 8 }}>
            {upState === "current" ? "✓ newest · " : upState === "error" ? "offline · " : ""}v{APP_VERSION}
          </div>
        </div>
        {saveErr && <div style={{ marginTop: 12, textAlign: "center", fontSize: 12, color: P.bad, fontFamily: SANS }}>Storage blocked — data may not persist.</div>}
      </div>

      {/* ---- date row: bare, transparent, above the dock (today only) ---- */}
      {tab === "today" && (
        <div style={{ position: "fixed", left: 0, right: 0, bottom: "max(78px, calc(env(safe-area-inset-bottom) + 78px))", zIndex: 10, display: "flex", alignItems: "center", justifyContent: "center", gap: 20, pointerEvents: "none" }}>
          <button onClick={() => setSel(shiftISO(sel, -1))} className="press"
            style={{ pointerEvents: "auto", width: 34, height: 34, borderRadius: "50%", background: "transparent", border: "none", color: P.faint, fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
          <div style={{ textAlign: "center", minWidth: 130, pointerEvents: "none" }}>
            <div style={{ fontSize: 13.5, fontWeight: 700, color: P.text, fontFamily: SANS, textShadow: "0 1px 8px rgba(0,0,0,0.8)" }}>{isToday ? "Today" : dayNameLong(sel)}</div>
            <div style={{ fontSize: 11, color: P.dim, fontFamily: MONO, textShadow: "0 1px 8px rgba(0,0,0,0.8)", marginTop: 1 }}>{prettyDate(sel)}</div>
          </div>
          <button onClick={() => setSel(shiftISO(sel, 1))} disabled={isToday} className="press"
            style={{ pointerEvents: "auto", width: 34, height: 34, borderRadius: "50%", background: "transparent", border: "none", color: isToday ? "rgba(219,219,219,0.2)" : P.faint, fontSize: 20, opacity: isToday ? 0.5 : 1, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
        </div>
      )}

      {/* ---- dock: single frosted bar, borderless, soft sliding selection ---- */}
      <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, height: 250, zIndex: 9, pointerEvents: "none",
        background: "linear-gradient(180deg, rgba(22,22,22,0) 0%, rgba(19,19,19,0.28) 34%, rgba(16,16,16,0.66) 68%, rgba(14,14,14,0.92) 100%)",
        WebkitMaskImage: "linear-gradient(180deg, rgba(0,0,0,0) 0%, #000 34%)", maskImage: "linear-gradient(180deg, rgba(0,0,0,0) 0%, #000 34%)" }} />
      <div style={{ position: "fixed", left: 0, right: 0, bottom: "max(14px, env(safe-area-inset-bottom))", zIndex: 10, display: "flex", justifyContent: "center", padding: "0 16px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: 5, borderRadius: 22,
          background: "rgba(40,40,40,0.66)", backdropFilter: "blur(30px) saturate(170%)", WebkitBackdropFilter: "blur(30px) saturate(170%)",
          boxShadow: "0 12px 40px rgba(0,0,0,0.6)" }}>
          {/* segmented Today / 7-day — soft sliding highlight, no borders */}
          <div style={{ position: "relative", display: "flex", borderRadius: 17, overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, bottom: 0, left: tab === "today" ? 0 : "50%", width: "50%",
              background: "linear-gradient(135deg, rgba(0,121,152,0.9) 0%, rgba(184,247,255,0.75) 150%)",
              borderRadius: 17, transition: "left 320ms cubic-bezier(.3,.85,.35,1)", boxShadow: "0 2px 12px rgba(0,121,152,0.45)" }} />
            {[["today", "Today"], ["week", "7-day"]].map(([k, l]) => (
              <button key={k} onClick={() => setTab(k)} className="press"
                style={{ position: "relative", zIndex: 1, minWidth: 92, padding: "12px 0", borderRadius: 17, fontSize: 14, fontWeight: 700, fontFamily: SANS,
                  background: "transparent", border: "none", color: tab === k ? "#fff" : P.dim, transition: "color 260ms ease" }}>
                {l}
              </button>
            ))}
          </div>
          {/* copy — borderless, tints on success */}
          <button onClick={copyAll} className="press" aria-label="Copy all stats" title="Copy all stats"
            style={{ padding: "12px 18px", borderRadius: 17, fontSize: 14, fontWeight: 700, fontFamily: SANS, display: "inline-flex", alignItems: "center", gap: 7, border: "none",
              background: copied ? "linear-gradient(135deg, rgba(0,121,152,0.9), rgba(184,247,255,0.75) 150%)" : "rgba(255,255,255,0.05)",
              color: copied ? "#fff" : P.dim, transition: "background 300ms ease, color 300ms ease",
              boxShadow: copied ? "0 0 20px rgba(184,247,255,0.35)" : "none" }}>
            {copied ? <React.Fragment>✓ Copied</React.Fragment> : <React.Fragment><Icon name="copy" size={16} /> Copy</React.Fragment>}
          </button>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
